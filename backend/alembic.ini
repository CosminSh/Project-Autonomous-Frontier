# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = alembic

# template used to generate migration file names
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# prepend the current directory to sys.path
prepend_sys_path = .

# timezone to use when rendering the date
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# version location specification
# version_locations = %(here)s/alembic/versions

# path_separator; This indicates what character is used to split lists of file paths
path_separator = os

# use the output encoding used when revision files are written
# output_encoding = utf-8

# database URL. This is consumed by the user-maintained env.py script only.
# In our project, env.py is modified to use DATABASE_URL from environment variables.
sqlalchemy.url = postgresql://admin:password@localhost/terminal_frontier


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
